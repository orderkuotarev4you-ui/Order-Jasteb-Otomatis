<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POMAN STR STORE</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: url('https://files.catbox.moe/jj3jez.jpg') no-repeat center/cover;
  color: white;
}
.container {
  background: rgba(0,0,0,0.7);
  min-height: 100vh;
  padding:20px;
}
.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}
button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00aaff;
  color:white;
  cursor:pointer;
  margin-top:10px;
}
input {
  padding:10px;
  width:100%;
  border-radius:8px;
  border:none;
}
.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup-content {
  background:#222;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>
<body>
<div class="container">
<h2>POMAN STR STORE</h2><div id="login">
<p>Masukkan Nama:</p>
<input type="text" id="nama">
<button onclick="masuk()">Masuk</button>
</div><div id="store" style="display:none">
<h3>Pilih Produk</h3>
<div id="produk"></div>
<button onclick="buatPesanan()">Buat Pesanan</button>
</div>
</div><div class="popup" id="popup">
<div class="popup-content">
<h3>Pembayaran</h3>
<p>DANA: 085828481568</p>
<p>GOPAY: 081220568534</p>
<img src="https://files.catbox.moe/9l043y.png" width="150"><br>
<p>Kirim bukti transfer ke WhatsApp</p>
<button onclick="kirimWA()">Kirim Bukti TF</button>
</div>
</div><script>
const dataProduk = [
 {nama:"50 AKUN GG", harga:10000},
 {nama:"100 AKUN GG", harga:15000},
 {nama:"150 AKUN GG", harga:20000},
 {nama:"200 AKUN GG", harga:25000},
 {nama:"250 AKUN GG", harga:30000},
 {nama:"300 AKUN GG", harga:35000},
 {nama:"350 AKUN GG", harga:50000}
];

let pilihan = [];

function masuk(){
 let nama = document.getElementById('nama').value;
 if(nama === "") return alert("Isi nama dulu!");
 document.getElementById('login').style.display='none';
 document.getElementById('store').style.display='block';
 tampilProduk();
}

function tampilProduk(){
 let html = "";
 dataProduk.forEach((p,i)=>{
  html += `<div class='card'>
  <b>${p.nama}</b><br>
  Rp ${p.harga}<br>
  <button onclick="tambah(${i})">Tambah</button>
  </div>`;
 });
 document.getElementById('produk').innerHTML = html;
}

function tambah(i){
 pilihan.push(dataProduk[i]);
 alert("Ditambahkan!");
}

function buatPesanan(){
 if(pilihan.length==0) return alert("Pilih produk dulu!");
 document.getElementById('popup').style.display='flex';
}

function kirimWA(){
 let total = 0;
 let list = "";
 pilihan.forEach(p=>{
  total += p.harga;
  list += p.nama + " - Rp " + p.harga + "%0A";
 });

 let now = new Date();
 let waktu = now.toLocaleString();

 let teks = `*HALO BANG POMAN*%0A*TOLONG KONFIRMASI PEMBELIAN SAYA*%0A%0A`+
 `HARGA: Rp ${total}%0A`+
 `JUMLAH RESS: ${pilihan.length}%0A`+
 `TANGGAL/BULAN/JAM: ${waktu}%0A%0A`+
 `LIST PRODUK:%0A${list}`;

 let url = "https://wa.me/6285828481568?text=" + teks;
 window.open(url, '_blank');
}
</script></body>
</html>
